name: Deploy Swindle to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            echo "======================================"
            echo "Deploying Swindle..."
            echo "======================================"

            echo "Moving to project directory..."
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "Pulling latest code from master..."
            git fetch origin master
            git reset --hard origin/master

            echo "Updating backend dependencies..."
            cd backend
            source venv/bin/activate

            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            elif [ -f pyproject.toml ]; then
              pip install -e .
            fi

            echo "Running database migrations..."
            python -m alembic upgrade head

            echo "Building frontend..."
            cd ../frontend

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "Setting production frontend API base..."
            echo "VITE_API_BASE=https://swindle.clevermike.studio/api/v1" > .env.production

            npm run build

            echo "Restarting Swindle backend..."
            sudo /usr/bin/systemctl restart swindle

            echo "Testing Nginx config..."
            sudo /usr/sbin/nginx -t

            echo "Reloading Nginx..."
            sudo /usr/bin/systemctl reload nginx

            echo "Checking Swindle backend status..."
            sudo /usr/bin/systemctl status swindle --no-pager

            echo "======================================"
            echo "Deployment complete."
            echo "======================================"